<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Why Math: Noise Cancellation Lab</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .lab-card {
            background: #161616;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        canvas {
            background: #000;
            border-radius: 10px;
            margin: 20px 0;
            width: 100%;
            height: 300px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .slider-box {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: center;
        }
        input[type=range] {
            width: 300px;
            accent-color: #00f2fe;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .red { background: #ff4d4d; }
        .blue { background: #00f2fe; }
        .white { background: #fff; }
        h1 { margin: 0; color: #00f2fe; letter-spacing: -1px; }
        p { color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="lab-card">
    <h1>The Silence Engine</h1>
    <p>Slide the <b>Phase Shift</b> to 180° to achieve destructive interference.</p>
    
    <div class="legend">
        <span><span class="dot red"></span>Ambient Noise (Plane)</span>
        <span><span class="dot blue"></span>Anti-Noise (AirPods)</span>
        <span><span class="dot white"></span>What You Hear</span>
    </div>

    <canvas id="waveCanvas"></canvas>

    <div class="controls">
        <div class="slider-box">
            <label>Phase Shift: <span id="phaseVal">0</span>°</label>
            <input type="range" id="phase" min="0" max="360" value="0">
        </div>
        <div class="slider-box">
            <label>Volume (Amp):</label>
            <input type="range" id="amp" min="10" max="100" value="50">
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const phaseSlider = document.getElementById('phase');
    const ampSlider = document.getElementById('amp');
    const phaseVal = document.getElementById('phaseVal');

    let time = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.width;
        const h = canvas.height;
        const midY = h / 2;
        const amp = parseInt(ampSlider.value);
        const phaseShift = (parseInt(phaseSlider.value) * Math.PI) / 180;
        
        phaseVal.innerText = phaseSlider.value;

        // Draw Ambient Noise (Red)
        ctx.beginPath();
        ctx.strokeStyle = '#ff4d4d';
        ctx.lineWidth = 2;
        for (let x = 0; x < w; x++) {
            const y = midY + Math.sin(x * 0.05 + time) * amp;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Draw Anti-Noise (Blue)
        ctx.beginPath();
        ctx.strokeStyle = '#00f2fe';
        ctx.lineWidth = 2;
        for (let x = 0; x < w; x++) {
            const y = midY + Math.sin(x * 0.05 + time + phaseShift) * amp;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Draw Resultant Wave (White) - THE MATH
        ctx.beginPath();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 4;
        for (let x = 0; x < w; x++) {
            const noise = Math.sin(x * 0.05 + time) * amp;
            const antiNoise = Math.sin(x * 0.05 + time + phaseShift) * amp;
            const combined = midY + (noise + antiNoise);
            x === 0 ? ctx.moveTo(x, combined) : ctx.lineTo(x, combined);
        }
        ctx.stroke();

        time += 0.1;
        requestAnimationFrame(draw);
    }

    // Set canvas resolution
    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();
    draw();
</script>

</body>
</html>
