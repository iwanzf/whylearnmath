<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luhn Algorithm Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 400px;
            border: 1px solid #475569;
        }
        h2 { margin-top: 0; color: #38bdf8; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: #38bdf8;
            letter-spacing: 2px;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }
        .status {
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .valid { background-color: #065f46; color: #34d399; }
        .invalid { background-color: #7f1d1d; color: #f87171; }
        .info {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 1rem;
            line-height: 1.4;
        }
        .btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background: #7dd3fc; }
    </style>
</head>
<body>

<div class="card">
    <h2>Card Validator</h2>
    <p>Type a 16-digit number to see the math work:</p>
    <input type="text" id="cardNumber" placeholder="4532 0000 0000 0000" maxlength="19">
    <div id="statusBox" class="status invalid">Waiting for input...</div>
    
    <div class="info">
        <strong>How it's working:</strong> Every second digit is doubled. If the result > 9, we subtract 9. We then sum everything. If the <strong>Sum % 10 == 0</strong>, the card is valid!
    </div>

    <button class="btn" onclick="generateValid()">Generate Valid Test Number</button>
</div>

<script>
    const input = document.getElementById('cardNumber');
    const statusBox = document.getElementById('statusBox');

    input.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, ''); // Remove non-digits
        validate(value);
    });

    function validate(number) {
        if (number.length < 13) {
            statusBox.textContent = "Too short...";
            statusBox.className = "status invalid";
            return;
        }

        let sum = 0;
        let shouldDouble = false;

        // Loop through digits from right to left
        for (let i = number.length - 1; i >= 0; i--) {
            let digit = parseInt(number.charAt(i));

            if (shouldDouble) {
                digit *= 2;
                if (digit > 9) digit -= 9;
            }

            sum += digit;
            shouldDouble = !shouldDouble;
        }

        const isValid = (sum % 10 === 0);
        
        if (isValid) {
            statusBox.textContent = "✓ VALID CARD (Sum: " + sum + ")";
            statusBox.className = "status valid";
        } else {
            statusBox.textContent = "× INVALID (Sum: " + sum + ")";
            statusBox.className = "status invalid";
        }
    }

    function generateValid() {
        // A simple valid Visa-style number for testing
        const validExample = "4532015112830367";
        input.value = validExample;
        validate(validExample);
    }
</script>

</body>
</html>
