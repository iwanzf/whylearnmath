<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Why Math: Matrix Filter Lab</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            text-align: center;
        }
        canvas {
            border-radius: 8px;
            margin-bottom: 20px;
            max-width: 100%;
            height: auto;
            border: 2px solid #333;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .matrix-display {
            font-family: 'Courier New', monospace;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            color: #00ff00;
            margin-top: 15px;
        }
        h1 { color: #ff3e00; margin-top: 0; }
        p { color: #bbb; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>Matrix Magic Lab</h1>
    <p>Adjust the <b>Color Weights</b> below. You are literally changing the values of the transformation matrix that the computer uses to render each pixel.</p>
    
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>Red Intensity</label>
            <input type="range" id="redWeight" min="0" max="2" step="0.1" value="1">
            <span id="rv">1.0</span>
        </div>
        <div class="control-group">
            <label>Green Intensity</label>
            <input type="range" id="greenWeight" min="0" max="2" step="0.1" value="1">
            <span id="gv">1.0</span>
        </div>
        <div class="control-group">
            <label>Blue Intensity</label>
            <input type="range" id="blueWeight" min="0" max="2" step="0.1" value="1">
            <span id="bv">1.0</span>
        </div>
    </div>

    <div class="matrix-display">
        New_Pixel = [R * <span id="mr">1.0</span>, G * <span id="mg">1.0</span>, B * <span id="mb">1.0</span>]
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const rIn = document.getElementById('redWeight');
    const gIn = document.getElementById('greenWeight');
    const bIn = document.getElementById('blueWeight');

    // Create a procedural "vibe" image since we can't load external ones easily
    function initCanvas() {
        canvas.width = 400;
        canvas.height = 250;
        // Draw a colorful gradient background
        let grad = ctx.createLinearGradient(0, 0, 400, 250);
        grad.addColorStop(0, "red");
        grad.addColorStop(0.5, "green");
        grad.addColorStop(1, "blue");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 400, 250);
        
        // Draw some shapes for detail
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(200, 125, 60, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = "yellow";
        ctx.fillRect(50, 50, 80, 80);
    }

    // Save the original pixel data
    let originalData = null;

    function applyMatrix() {
        if (!originalData) {
            originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        const rw = parseFloat(rIn.value);
        const gw = parseFloat(gIn.value);
        const bw = parseFloat(bIn.value);

        // Update UI labels
        document.getElementById('rv').innerText = rw;
        document.getElementById('gv').innerText = gw;
        document.getElementById('bv').innerText = bw;
        document.getElementById('mr').innerText = rw;
        document.getElementById('mg').innerText = gw;
        document.getElementById('mb').innerText = bw;

        const imgData = new ImageData(
            new Uint8ClampedArray(originalData.data),
            originalData.width,
            originalData.height
        );
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
            // Apply the "Matrix Transformation" to each RGB channel
            data[i]     = data[i]     * rw; // Red
            data[i + 1] = data[i + 1] * gw; // Green
            data[i + 2] = data[i + 2] * bw; // Blue
            // data[i+3] is Alpha (transparency), we leave it alone
        }

        ctx.putImageData(imgData, 0, 0);
    }

    // Event listeners for sliders
    [rIn, gIn, bIn].forEach(el => el.addEventListener('input', applyMatrix));

    // Kick it off
    initCanvas();
    // Capture the "clean" state
    originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
</script>

</body>
</html>
