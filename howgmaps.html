<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Maps Simulator (Dijkstra's Math)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        h2 { margin-top: 20px; color: #4285F4; }
        .controls { margin-bottom: 15px; background: #333; padding: 15px; border-radius: 8px; }
        canvas { border: 2px solid #555; background: #222; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .legend { display: flex; gap: 20px; margin-top: 10px; font-size: 0.9em; }
        .key { width: 15px; height: 15px; display: inline-block; border-radius: 3px; margin-right: 5px; }
        button { background: #4285F4; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #357ae8; }
    </style>
</head>
<body>

    <h2>Route Optimization Engine</h2>
    <div class="controls">
        <button onclick="resetGrid()">Clear Traffic Jams</button>
        <span style="margin-left:15px">Click/Drag on grid to create <b>Heavy Traffic</b> (Walls)</span>
    </div>

    <canvas id="gridCanvas" width="600" height="400"></canvas>

    <div class="legend">
        <div><span class="key" style="background: #0f9d58;"></span> Start</div>
        <div><span class="key" style="background: #db4437;"></span> Destination</div>
        <div><span class="key" style="background: #555;"></span> Traffic Jam</div>
        <div><span class="key" style="background: #f4b400;"></span> Shortest Path</div>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const ROWS = 20;
        const COLS = 30;
        const SIZE = 20;

        let grid = [];
        let isDrawing = false;

        const start = { r: 10, c: 5 };
        const end = { r: 10, c: 25 };

        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = { isWall: false, dist: Infinity, parent: null };
                }
            }
            findPath();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let color = "#333";
                    if (grid[r][c].isWall) color = "#555";
                    if (r === start.r && c === start.c) color = "#0f9d58";
                    if (r === end.r && c === end.c) color = "#db4437";
                    
                    ctx.fillStyle = color;
                    ctx.fillRect(c * SIZE, r * SIZE, SIZE - 1, SIZE - 1);
                }
            }
            drawPath();
        }

        function findPath() {
            // Reset distances
            for(let r=0; r<ROWS; r++) 
                for(let c=0; c<COLS; c++) { grid[r][c].dist = Infinity; grid[r][c].parent = null; }

            let queue = [{ r: start.r, c: start.c, d: 0 }];
            grid[start.r][start.c].dist = 0;

            while (queue.length > 0) {
                queue.sort((a, b) => a.d - b.d);
                let curr = queue.shift();

                if (curr.r === end.r && curr.c === end.c) break;

                const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];
                for (let [dr, dc] of dirs) {
                    let nr = curr.r + dr, nc = curr.c + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc].isWall) {
                        let newDist = curr.d + 1;
                        if (newDist < grid[nr][nc].dist) {
                            grid[nr][nc].dist = newDist;
                            grid[nr][nc].parent = { r: curr.r, c: curr.c };
                            queue.push({ r: nr, c: nc, d: newDist });
                        }
                    }
                }
            }
            draw();
        }

        function drawPath() {
            let curr = grid[end.r][end.c].parent;
            ctx.strokeStyle = "#f4b400";
            ctx.lineWidth = 4;
            ctx.beginPath();
            if(!curr) return;
            ctx.moveTo(end.c * SIZE + SIZE/2, end.r * SIZE + SIZE/2);
            
            while (curr && !(curr.r === start.r && curr.c === start.c)) {
                ctx.lineTo(curr.c * SIZE + SIZE/2, curr.r * SIZE + SIZE/2);
                curr = grid[curr.r][curr.c].parent;
            }
            ctx.lineTo(start.c * SIZE + SIZE/2, start.r * SIZE + SIZE/2);
            ctx.stroke();
        }

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const c = Math.floor(x / SIZE);
            const r = Math.floor(y / SIZE);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                if ((r !== start.r || c !== start.c) && (r !== end.r || c !== end.c)) {
                    grid[r][c].isWall = true;
                    findPath();
                }
            }
        }

        canvas.onmousedown = (e) => { isDrawing = true; handleInput(e); };
        window.onmouseup = () => { isDrawing = false; };
        canvas.onmousemove = (e) => { if (isDrawing) handleInput(e); };

        function resetGrid() { initGrid(); }

        initGrid();
    </script>
</body>
</html>
