<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Vibe Matcher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #38bdf8; margin-top: 0; }
        .user-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #334155;
            padding: 15px;
            border-radius: 0.5rem;
        }
        label { display: block; margin-top: 10px; font-size: 0.9rem; color: #94a3b8; }
        input[type="range"] { width: 100%; accent-color: #38bdf8; }
        .result-box {
            text-align: center;
            padding: 20px;
            background: #0ea5e9;
            border-radius: 0.5rem;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .math-display {
            font-family: monospace;
            background: #000;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #4ade80;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vibe Matcher 2000</h1>
        <p>Adjust the interest levels (0-10) to see how the <b>Matrix Dot Product</b> finds a match.</p>
        
        <div class="user-section">
            <div class="card">
                <h3>User A (You)</h3>
                <label>Gaming</label>
                <input type="range" id="a1" min="0" max="10" value="8">
                <label>Cooking</label>
                <input type="range" id="a2" min="0" max="10" value="2">
                <label>Anime</label>
                <input type="range" id="a3" min="0" max="10" value="9">
            </div>
            
            <div class="card">
                <h3>User B (Stranger)</h3>
                <label>Gaming</label>
                <input type="range" id="b1" min="0" max="10" value="7">
                <label>Cooking</label>
                <input type="range" id="b2" min="0" max="10" value="1">
                <label>Anime</label>
                <input type="range" id="b3" min="0" max="10" value="8">
            </div>
        </div>

        <div class="result-box" id="match-text">
            Match Score: 0
        </div>

        <div class="math-display" id="math-steps">
            Calculation: (8*7) + (2*1) + (9*8) = ...
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('input');
        const matchText = document.getElementById('match-text');
        const mathSteps = document.getElementById('math-steps');

        function calculateMatch() {
            const a = [
                parseInt(document.getElementById('a1').value),
                parseInt(document.getElementById('a2').value),
                parseInt(document.getElementById('a3').value)
            ];
            const b = [
                parseInt(document.getElementById('b1').value),
                parseInt(document.getElementById('b2').value),
                parseInt(document.getElementById('b3').value)
            ];

            // The Linear Algebra: Dot Product
            const score = (a[0] * b[0]) + (a[1] * b[1]) + (a[2] * b[2]);
            
            // Visual feedback
            matchText.innerText = `Match Score: ${score}`;
            mathSteps.innerText = `Matrix Math: (${a[0]} * ${b[0]}) + (${a[1]} * ${b[1]}) + (${a[2]} * ${b[2]}) = ${score}`;
            
            // Change color based on score
            if (score > 150) {
                matchText.style.backgroundColor = "#22c55e"; // Success green
                matchText.innerText += " - IT'S A MATCH! ??";
            } else if (score > 80) {
                matchText.style.backgroundColor = "#0ea5e9"; // Neutral blue
            } else {
                matchText.style.backgroundColor = "#ef4444"; // Low match red
                matchText.innerText += " - No Vibe Found ??";
            }
        }

        inputs.forEach(input => input.addEventListener('input', calculateMatch));
        
        // Run once on load
        calculateMatch();
    </script>
</body>
</html>
